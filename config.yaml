general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

model_list:
  # Tier 1: The Heavyweight Agents (Frontier Free Tiers)
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-pro-latest
      api_key: os.environ/GEMINI_API_KEY
  - model_name: gpt-4o
    litellm_params:
      model: github/gpt-4o
      api_key: os.environ/GITHUB_TOKEN
  - model_name: llama-405b
    litellm_params:
      model: github/Meta-Llama-3.1-405B-Instruct
      api_key: os.environ/GITHUB_TOKEN

  # Tier 2: Managed OSS (High Performance)
  - model_name: groq-llama-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: nvidia-deepseek
    litellm_params:
      model: nvidia_nim/deepseek-ai/deepseek-v4-flash
      api_key: os.environ/NVIDIA_NIM_API_KEY

  # Tier 3: Fast/High-Volume Fallback
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-flash-latest
      api_key: os.environ/GEMINI_API_KEY

  # Tier 4: Aggregator Free Models
  - model_name: openrouter-llama
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: openrouter-qwen
    litellm_params:
      model: openrouter/qwen/qwen3-next-80b-a3b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY

  # Tier 5: Local CPU Survival
  - model_name: local-cpu-survival
    litellm_params:
      model: ollama/phi4-mini:latest
      api_base: http://localhost:11434

router_settings:
  # When the primary model (gemini-pro) hits a rate limit (429), it cascades down this list.
  fallbacks: [{"gemini-pro": ["gpt-4o", "groq-llama-70b", "llama-405b", "nvidia-deepseek", "gemini-flash", "openrouter-qwen", "openrouter-llama", "local-cpu-survival"]}]
  routing_strategy: least-busy

litellm_settings:
  callbacks: ["proxy_callbacks.resilience_logger"]
  drop_params: true